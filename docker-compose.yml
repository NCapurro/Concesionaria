
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: concesionaria-app
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www
    depends_on:
      - db

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-concesionaria}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-user}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db-data: